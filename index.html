<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Runner Mobile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <div id="game">

    <!-- Road lines -->
    <div class="road-line" style="left: 95px;"></div>
    <div class="road-line" style="left: 195px;"></div>

    <!-- Player -->
    <div id="car"></div>

  </div>

  <!-- HUD -->
  <div class="hud">
    <span id="score">0</span>
    <span id="highScore">0</span>
  </div>

  <!-- Game Over Screen -->
  <div id="gameOverScreen" class="hidden">
    <h2>💥 Game Over</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Restart</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
