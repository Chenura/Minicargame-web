<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <div id="game">
    <div id="road"></div>
    <img id="car" src="assets/player.png">
  </div>

  <div class="hud">
    <span id="score">0</span>
    <span id="highScore">High: 0</span>
  </div>

  <div id="gameOverScreen" class="hidden">
    <h2>💥 Game Over</h2>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Restart</button>
  </div>

</div>

<audio id="engineSound" src="assets/engine.mp3" loop></audio>
<audio id="crashSound" src="assets/crash.mp3"></audio>
<audio id="bgMusic" src="assets/music.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
